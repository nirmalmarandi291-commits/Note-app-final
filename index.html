<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Note App - Pro Fix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDal5hWaClXBGSOrcfXp-W0SXKnTvTi43c",
        authDomain: "note-app-8b344.firebaseapp.com",
        databaseURL: "https://note-app-8b344-default-rtdb.firebaseio.com",
        projectId: "note-app-8b344",
        storageBucket: "note-app-8b344.firebasestorage.app",
        messagingSenderId: "502977908606",
        appId: "1:502977908606:web:31fe75bbed9b2deae76d2f",
        measurementId: "G-LNM0NDJS53"
      };
    
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const auth = firebase.auth();
      const provider = new firebase.auth.GoogleAuthProvider();

      function loginWithGoogle() {
          auth.signInWithPopup(provider).catch(e => { if(e.code === 'auth/popup-blocked') auth.signInWithRedirect(provider); });
      }

      auth.onAuthStateChanged((user) => {
          if (user) {
              document.getElementById('authScreen').style.display = 'none';
              document.getElementById('appContainer').style.display = 'block';
              document.getElementById('userHeaderImg').src = user.photoURL || '';
              document.getElementById('profileImgLarge').src = user.photoURL || '';
              document.getElementById('profileName').innerText = user.displayName;
              document.getElementById('profileEmail').innerText = user.email;

              // Generate Referral Code from UID
              const refCode = user.uid.substring(0, 6).toUpperCase();
              document.getElementById('myReferCode').innerText = refCode;

              handleUserData(user, refCode); 
              startLiveBalance(user.uid);
              loadLeaderboard();
          } else {
              document.getElementById('authScreen').style.display = 'flex';
              document.getElementById('appContainer').style.display = 'none';
          }
      });

      function handleUserData(user, refCode) {
          database.ref('users/' + user.uid).once('value', (snap) => {
              if(!snap.exists()) {
                  database.ref('users/' + user.uid).set({
                      name: user.displayName, email: user.email, uid: user.uid, coins: 0, 
                      spinsLeft: 3, streak: 0, lastLogin: "", lastSpinDate: new Date().toLocaleDateString(),
                      referCode: refCode
                  });
              }
          });
      }

      function startLiveBalance(uid) {
          database.ref('users/' + uid).on('value', (snapshot) => {
              const data = snapshot.val();
              if (data) {
                  document.getElementById('userRupees').innerText = "₹" + ((data.coins || 0) / 100).toFixed(2);
                  document.getElementById('userCoins').innerText = data.coins || 0;
                  document.getElementById('spinsLeftTxt').innerText = data.spinsLeft ?? 3;
                  loadHistory(uid);
                  loadWithdrawHistory(uid);
                  checkStreakStatus(data);
              }
          });
          database.ref('admin/notice').on('value', (snap) => {
              document.getElementById('noticeText').innerText = snap.val() || "WELCOME TO NOTE APP!";
          });
      }

      // --- REFER & EARN LOGIC ---
      function shareReferral() {
          const code = document.getElementById('myReferCode').innerText;
          const msg = encodeURIComponent(`🔥 Note App se paise kamao! Mera referral code use karo: ${code} aur pao ₹100 bonus. \nLink: ${window.location.href}`);
          window.open(`https://wa.me/?text=${msg}`);
      }

      function copyReferCode() {
          const code = document.getElementById('myReferCode').innerText;
          navigator.clipboard.writeText(code);
          alert("Refer Code Copied! ✅");
      }

      // --- BAKI LOGICS ---
      function handleMethodChange() {
          const method = document.getElementById('payMethod').value;
          const bankFields = document.getElementById('bankExtraFields');
          const detailsInput = document.getElementById('payDetails');
          if(method === "Bank") { bankFields.classList.remove('hidden'); detailsInput.placeholder = "Account Holder Name"; }
          else { bankFields.classList.add('hidden'); detailsInput.placeholder = "Enter " + method + " ID/Number"; }
      }

      function processWithdraw() {
          const amount = parseInt(document.getElementById('amountInput').value);
          const details = document.getElementById('payDetails').value;
          if (!amount || amount < 10 || !details) { alert("Sahi details bharein! Min ₹10"); return; }
          database.ref('users/' + auth.currentUser.uid).once('value', (snap) => {
              const bal = snap.val().coins || 0;
              if (bal < amount * 100) { alert("Insufficient Balance!"); return; }
              const request = { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount, method: document.getElementById('payMethod').value, details, status: "Pending", time: new Date().toLocaleString() };
              database.ref('withdrawals').push(request);
              database.ref('users/' + auth.currentUser.uid).update({ coins: bal - (amount * 100) });
              addHistory("Withdrawal", -(amount * 100));
              alert("Payment Request Sent! ✅");
              document.getElementById('withdrawModal').classList.add('hidden');
          });
      }

      function addHistory(type, amount) { database.ref('history/' + auth.currentUser.uid).push({ type, amount, date: new Date().toLocaleString() }); }
      function loadHistory(uid) { database.ref('history/' + uid).limitToLast(10).on('value', (snap) => { const container = document.getElementById('historyList'); container.innerHTML = ""; snap.forEach((child) => { const item = child.val(); container.innerHTML = `<div class="bg-white p-3 rounded-xl mb-2 shadow-sm border-l-4 border-emerald-500 flex justify-between"><div><p class="font-bold text-[10px] uppercase">${item.type}</p><p class="text-[8px] text-gray-400">${item.date}</p></div><p class="font-black text-emerald-600 text-xs">${item.amount >= 0 ? '+' : ''}${item.amount} C</p></div>` + container.innerHTML; }); }); }
      function loadWithdrawHistory(uid) { database.ref('withdrawals').orderByChild('uid').equalTo(uid).on('value', (snap) => { const container = document.getElementById('withdrawHistoryList'); container.innerHTML = ""; snap.forEach((child) => { const item = child.val(); container.innerHTML = `<div class="bg-white p-4 rounded-2xl mb-2 flex justify-between items-center shadow-sm"><div><p class="font-bold text-xs">₹${item.amount}</p><p class="text-[9px] text-gray-400">${item.time}</p></div><p class="font-black text-[10px] uppercase text-orange-500">${item.status}</p></div>` + container.innerHTML; }); }); }
      function loadLeaderboard() { database.ref('users').orderByChild('coins').limitToLast(10).on('value', (snap) => { const list = document.getElementById('leaderboardList'); list.innerHTML = ""; let users = []; snap.forEach(c => users.push(c.val())); users.reverse().forEach((u, i) => { list.innerHTML += `<div class="bg-white p-4 rounded-2xl mb-2 flex justify-between items-center shadow-sm"><div class="flex items-center gap-3"><span class="font-black text-slate-300">#${i+1}</span><p class="font-bold text-sm">${u.name}</p></div><p class="font-black text-emerald-600 text-xs">${u.coins} C</p></div>`; }); }); }
      function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-emerald-600', 'text-slate-300')); const btns = document.querySelectorAll('.nav-btn'); btns.forEach(b => { if(b.getAttribute('onclick').includes(id)) b.classList.replace('text-slate-300', 'text-emerald-600'); }); }
      function toggleProfile() { document.getElementById('profileOverlay').classList.toggle('hidden'); }
      function toggleWithdrawTabs(type) { document.getElementById('transList').classList.toggle('hidden', type === 'history'); document.getElementById('withHistoryList').classList.toggle('hidden', type === 'trans'); }
      function checkStreakStatus(data) { const today = new Date().toLocaleDateString(); if (data.lastLogin !== today) { document.getElementById('streakModal').classList.remove('hidden'); document.getElementById('streakDayTxt').innerText = "Day " + ((data.streak || 0) + 1); } }
      function claimStreak() { const today = new Date().toLocaleDateString(); database.ref('users/' + auth.currentUser.uid).once('value', snap => { let ns = (snap.val().streak || 0) + 1; if(ns>7) ns=1; database.ref('users/' + auth.currentUser.uid).update({ streak: ns, lastLogin: today, coins: firebase.database.ServerValue.increment(ns*20) }); addHistory("Daily Streak", ns*20); document.getElementById('streakModal').classList.add('hidden'); }); }
      
      let canSpin = true;
      function startSpin() { if(!canSpin) return; const today = new Date().toLocaleDateString(); database.ref('users/' + auth.currentUser.uid).once('value', snap => { let spins = (snap.val().lastSpinDate === today) ? (snap.val().spinsLeft ?? 3) : 3; if(spins <= 0) { alert("Aaj ke spins khatam!"); return; } canSpin = false; const wheel = document.getElementById('wheel'); const randomSlice = Math.floor(Math.random() * 6); wheel.style.transition = "transform 4s cubic-bezier(0.17, 0.67, 0.1, 1)"; wheel.style.transform = `rotate(${3600 + (randomSlice * 60)}deg)`; setTimeout(() => { const winCoins = [100, 50, 20, 10, 5, 1][randomSlice]; database.ref('users/' + auth.currentUser.uid).update({ coins: firebase.database.ServerValue.increment(winCoins), spinsLeft: spins - 1, lastSpinDate: today }); addHistory("Spin Win", winCoins); canSpin = true; wheel.style.transition = "none"; wheel.style.transform = `rotate(0deg)`; alert("You won " + winCoins + " Coins!"); }, 4100); }); }
      function initScratch() { const canvas = document.getElementById('scratchCanvas'); const ctx = canvas.getContext('2d'); const winAmount = Math.floor(Math.random() * 40) + 10; document.getElementById('scratchReward').innerText = winAmount; ctx.fillStyle = '#cbd5e1'; ctx.fillRect(0, 0, 220, 220); ctx.font = "bold 16px Inter"; ctx.fillStyle = "#64748b"; ctx.fillText("SCRATCH HERE", 55, 110); let isDrawing = false; canvas.onmousedown = canvas.ontouchstart = () => isDrawing = true; canvas.onmousemove = canvas.ontouchmove = (e) => { if(!isDrawing) return; const rect = canvas.getBoundingClientRect(); const x = (e.pageX || (e.touches ? e.touches[0].pageX : 0)) - rect.left; const y = (e.pageY || (e.touches ? e.touches[0].pageY : 0)) - rect.top; ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2); ctx.fill(); checkScratch(); }; canvas.onmouseup = canvas.ontouchend = () => isDrawing = false; }
      let scratched = false;
      function checkScratch() { if(scratched) return; scratched = true; setTimeout(() => { const coins = parseInt(document.getElementById('scratchReward').innerText); database.ref('users/' + auth.currentUser.uid).update({ coins: firebase.database.ServerValue.increment(coins), lastScratch: new Date().toLocaleDateString() }); addHistory("Scratch Card", coins); document.getElementById('scratchModal').classList.add('hidden'); scratched = false; }, 2500); }
      function watchAd() { const overlay = document.getElementById('adOverlay'); const video = document.getElementById('adVideo'); overlay.classList.remove('hidden'); video.play(); video.onended = function() { overlay.classList.add('hidden'); database.ref('users/' + auth.currentUser.uid + '/coins').transaction(c => (c || 0) + 20); addHistory("Watch Ad", 20); }; }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .notice-scroll { animation: scrollText 15s linear infinite; white-space: nowrap; display: inline-block; width: 100%; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 0 auto; background: #1e293b; padding: 10px; border-radius: 50%; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #ef4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 30; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: white; border-radius: 50%; z-index: 25; display: flex; align-items: center; justify-content: center; color: #10b981; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; background: conic-gradient(#10b981 0deg 60deg, #fff 60deg 120deg, #10b981 120deg 180deg, #fff 180deg 240deg, #10b981 240deg 300deg, #fff 300deg 360deg); position: relative; overflow: hidden; }
        .coin-label { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: 800; font-size: 16px; padding-top: 20px; display: flex; flex-direction: column; align-items: center; }
        canvas { touch-action: none; border-radius: 20px; }
    </style>
</head>
<body class="pb-24">

    <div id="authScreen" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center p-8 text-center" style="display: flex;">
        <div class="w-20 h-20 bg-emerald-600 rounded-3xl shadow-2xl flex items-center justify-center text-white text-4xl mb-6 shadow-emerald-100"><i class="fa-solid fa-wallet"></i></div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">NOTE APP</h1>
        <button onclick="loginWithGoogle()" class="w-full max-w-xs bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-xl flex items-center justify-center gap-3">

        </div>

        <header class="p-4 flex justify-between items-center bg-white border-b sticky top-[34px] z-40">

            <img id="userHeaderImg" onclick="toggleProfile()" class="w-9 h-9 rounded-full border-2 border-emerald-500 p-0.5 cursor-pointer shadow-md" src="">
        </header>

        <div id="home" class="tab-content p-4 text-center">
            <div class="bg-emerald-600 rounded-[35px] p-7 text-white shadow-xl mb-6 relative overflow-hidden">
                <p class="text-[9px] opacity-70 uppercase font-black">Total Balance</p>
                <h2 id="userRupees" class="text-4xl font-black mt-1">₹0.00</h2>
                <p class="text-xs mt-1 font-semibold"><i class="fa-solid fa-coins text-yellow-300"></i> <span id="userCoins">0</span> Coins</p>
                <button onclick="document.getElementById('withdrawModal').classList.remove('hidden')" class="mt-5 bg-white text-emerald-700 w-full py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase">WITHDRAW NOW</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div onclick="document.getElementById('scratchModal').classList.remove('hidden'); initScratch();" class="bg-white p-6 rounded-3xl border border-slate-100 text-center active:scale-95 transition-all shadow-sm"><i class="fa-solid fa-gift text-2xl text-orange-400 mb-2"></i><p class="font-bold text-[10px] uppercase text-slate-600">Scratch Card</p></div>
                <div onclick="showTab('spin')" class="bg-white p-6 rounded-3xl border border-slate-100 text-center active:scale-95 transition-all shadow-sm"><i class="fa-solid fa-circle-notch text-2xl text-blue-400 mb-2"></i><p class="font-bold text-[10px] uppercase text-slate-600">Lucky Spin</p></div>
            </div>

            <div class="bg-white p-6 rounded-[35px] border-2 border-dashed border-emerald-200 text-left relative overflow-hidden shadow-sm">
                <div class="absolute right-[-10px] top-[-10px] opacity-10"><i class="fa-solid fa-users text-7xl text-emerald-600"></i></div>
                <p class="text-emerald-600 font-black text-[10px] uppercase tracking-widest mb-1">Refer & Earn ₹100</p>
                <h3 class="font-black text-slate-800 text-sm mb-4 italic">Get 10,000 Coins per invite!</h3>
                
                <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl mb-4 border border-slate-100">
                    <span id="myReferCode" class="font-black text-emerald-700 text-lg tracking-widest flex-1">------</span>
                    <button onclick="copyReferCode()" class="bg-emerald-100 text-emerald-600 p-2 rounded-xl active:scale-90"><i class="fa-solid fa-copy"></i></button>
                </div>

                <button onclick="shareReferral()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-lg shadow-emerald-100 uppercase">
                    <i class="fa-brands fa-whatsapp text-lg"></i> SHARE NOW
                </button>
            </div>
        </div>

        <div id="spin" class="tab-content hidden p-4 text-center">
            <h2 class="text-xl font-black mb-8 text-slate-800 uppercase italic underline">Lucky Spin</h2>
            <div class="wheel-container mb-10"><div class="wheel-pointer"></div><div class="wheel-center"><i class="fa-solid fa-coins"></i></div><div id="wheel" class="wheel shadow-2xl"><div class="coin-label" style="transform: rotate(30deg); color: white;">100</div><div class="coin-label" style="transform: rotate(90deg);">50</div><div class="coin-label" style="transform: rotate(150deg); color: white;">20</div><div class="coin-label" style="transform: rotate(210deg);">10</div><div class="coin-label" style="transform: rotate(270deg); color: white;">5</div><div class="coin-label" style="transform: rotate(330deg);">1</div></div></div>
            <button onclick="startSpin()" class="w-full max-w-xs bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase">SPIN NOW</button>
            <p class="text-[10px] text-slate-400 mt-4">Left Today: <span id="spinsLeftTxt" class="text-emerald-600">3</span></p>
        </div>

        <div id="leaderboard" class="tab-content hidden p-4 font-black text-center"><h2 class="text-xl mb-4 uppercase">Top Earners</h2><div id="leaderboardList"></div></div>

        <div id="history" class="tab-content hidden p-4 font-black"><h2 class="text-xl mb-4 uppercase text-center text-emerald-600">History</h2><div id="historyList"></div><h2 class="text-sm mt-8 border-b pb-2 uppercase">Payments</h2><div id="withdrawHistoryList"></div></div>
    </div>

    <div id="withdrawModal" class="fixed inset-0 z-[150] bg-black/80 flex items-end justify-center hidden p-4 backdrop-blur-sm">
        <div class="bg-white w-full rounded-t-[40px] p-10 text-center shadow-2xl font-black">

            <select id="payMethod" onchange="handleMethodChange()" class="w-full p-4 rounded-xl bg-slate-50 mb-4 font-black text-sm outline-none border"><option value="UPI">UPI ID</option><option value="Paytm">Paytm</option><option value="PhonePe">PhonePe</option><option value="GPay">GPay</option><option value="Bank">Bank Account</option></select>
            <input type="text" id="payDetails" placeholder="Details" class="w-full p-4 rounded-xl bg-slate-50 mb-4 font-black text-sm outline-none border text-center">

            <input type="number" id="amountInput" placeholder="Min ₹10" class="w-full p-4 rounded-xl bg-slate-50 mb-8 font-black text-sm outline-none border text-center">

    <div id="profileOverlay" class="fixed inset-0 z-[100] bg-black/50 hidden backdrop-blur-sm">
        <div class="bg-white absolute right-0 top-0 h-full w-72 p-8 shadow-xl flex flex-col font-bold text-center border-l">
            <button onclick="toggleProfile()" class="text-3xl text-slate-300 self-end mb-4 font-black text-right">&times;</button>
            <img id="profileImgLarge" class="w-20 h-20 rounded-full mx-auto border-4 border-emerald-50 mb-4 shadow-md text-xs" src="" alt="Photo">
            <h3 id="profileName" class="text-lg text-slate-800 uppercase font-black tracking-tight">---</h3>
            <p id="profileEmail" class="text-[10px] text-slate-400 mb-8 italic font-normal">---</p>
            <div class="space-y-4">
                <a href="https://t.me/your_telegram" target="_blank" class="w-full bg-blue-500 text-white py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 shadow-lg"><i class="fa-brands fa-telegram text-lg"></i> Support</a>

            </div>
